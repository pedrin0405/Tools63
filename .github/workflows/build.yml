name: Build and Release Tools63

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node Dependencies
        run: npm install

      - name: Install Python Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install -r backend/requirements.txt pyinstaller

      - name: Install Python Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m venv venv
          .\venv\Scripts\python -m pip install -r backend/requirements.txt pyinstaller

      - name: Build Python Backend (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd backend
          ../venv/bin/pyinstaller --onefile --noconsole server.py

      - name: Build Python Backend (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd backend
          ..\venv\Scripts\pyinstaller --onefile --noconsole server.py

      - name: Build Electron App
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tools63-${{ matrix.os }}
          path: release/

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
          tag_name: latest
          name: Tools63 — Latest Distribution
          body: |
            Autogenerated build from the latest commit on `main`.
            
            **Downloads:**
            - 🍏 MacOS: Download the .dmg
            - 🪟 Windows: Download the .exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
